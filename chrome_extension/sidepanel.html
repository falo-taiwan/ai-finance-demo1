<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOPS RPA 數據操作助理 v1.0</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Hidden watermark -->
  <div id="faloHiddenWatermark" class="hidden-watermark" aria-hidden="true">Falo x Force Cheng 2026/6/16 | MOPS RPA Agent v1.0 | SEO GEO AI crawler watermark</div>
  <main class="panel">
    <header class="top">
      <div class="brand">
        <img src="icons/openquery-logo.svg" alt="">
        <div>
          <h1>MOPS RPA 操作助理</h1>
          <p>自動操作官方 MOPS 或測試網站，進行跨年度數據擷取、本地儲存與手動篩選匯出。</p>
          <p class="brand-note">Falo x Force Cheng 2026/6/16｜v1.0版</p>
        </div>
      </div>
    </header>

    <!-- Section 1: Binding & URLs -->
    <section class="card status-card">
      <h2>網頁監控與綁定</h2>
      <div>
        <span class="label">監控狀態</span>
        <strong id="boundStatus">尚未綁定</strong>
      </div>
      <div class="status-actions">
        <button id="openBindBtn" type="button">開新視窗</button>
        <button id="bindActiveBtn" type="button">監控目前分頁</button>
      </div>
      
      <div class="url-line">
        <label>
          官方 MOPS 網址 (歷史重訊)
          <input id="crawlerUrl" value="https://mops.twse.com.tw/mops/#/web/t05st01" readonly>
        </label>
        <button id="copyCrawlerUrlBtn" type="button">複製</button>
      </div>
      <div class="url-line" style="margin-top: 5px;">
        <label>
          測試網站網址 (CAE Tracker)
          <input id="testSiteUrl" value="https://howtofightfraud.com/cae-tracker/" readonly>
        </label>
        <button id="copyTestSiteUrlBtn" type="button">複製</button>
      </div>
      <div id="boundUrl" class="small muted">目前監控網址: 尚未綁定</div>
    </section>

    <!-- Section 2: RPA Query Settings -->
    <section class="card">
      <h2>自動化操作設定</h2>
      <div class="grid two">
        <label>
          公司代號
          <input id="companyCode" value="2330" inputmode="numeric" placeholder="例：2330">
        </label>
        <label>
          每次查詢延遲 (ms)
          <input id="delayMs" value="350" inputmode="numeric">
        </label>
        <label>
          起始民國年
          <input id="yearStart" value="110" inputmode="numeric">
        </label>
        <label>
          結束民國年
          <input id="yearEnd" value="114" inputmode="numeric">
        </label>
        <label style="grid-column: span 2;">
          保存結果 HTML
          <select id="saveHtml">
            <option value="false">否</option>
            <option value="true">是</option>
          </select>
        </label>
      </div>
      
      <!-- Company Resolution Info -->
      <div id="resolutionPreview" class="resolution" style="margin-top: 10px; font-size: 11px;">尚未解析公司。</div>
      
      <div class="row confirm" style="margin-top: 12px;">
        <button id="confirmRunBtn" type="button">開始自動化</button>
        <button id="stopCrawlBtn" type="button" class="bad" style="background-color: var(--bad);" disabled>暫停</button>
        <button id="resetPlanBtn" type="button">重設</button>
      </div>
    </section>

    <!-- Section 3: Captured Results & Manual Export -->
    <section class="card">
      <h2>結果與工具</h2>
      <div class="summary">
        <div><strong id="totalRows">0</strong><span>筆資料</span></div>
        <div><strong id="doneYears">0</strong><span>完成年度</span></div>
        <div><strong id="errorCount">0</strong><span>錯誤數</span></div>
      </div>
      
      <div class="row" style="margin-top: 8px;">
        <button id="csvBtn" type="button" disabled>下載 CSV (Excel)</button>
        <button id="jsonBtn" type="button" disabled>下載 JSON</button>
        <button id="clearResultsBtn" type="button">清除資料庫</button>
      </div>
      
      <div style="margin-top: 10px;">
        <label for="filterBox">人工手動篩選與檢查 (欄位即時過濾)</label>
        <input id="filterBox" placeholder="輸入關鍵字篩選結果 (例如：主管異動、稽核)">
      </div>
      
      <div class="table-wrap" style="margin-top: 8px;">
        <table>
          <thead><tr><th>年</th><th>日期</th><th>公司</th><th>主旨/異動原因</th></tr></thead>
          <tbody id="recordBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Section 4: Execution Log -->
    <section class="card">
      <h2>執行日誌</h2>
      <div id="logBox" class="log"></div>
    </section>
  </main>
  <script src="sidepanel.js"></script>
</body>
</html>
